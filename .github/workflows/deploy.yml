name: Deploy Next.js to Tencent Cloud

on:
  push:
    branches:
      - master # 当推送到 main 分支时触发

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18' # 替换为你的 Node 版本

      - name: Install Dependencies
        run: npm ci

      - name: Build Project
        run: npm run build

      - name: Deploy to Server
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }} # 或者使用 ssh_key
          port: 2222
          source: "./ecosystem.config.js,.next/standalone/**,.next/static/**,public/**"
          target: "/www/wwwroot/ticket-server2"
          strip_components: 1 # 去除一层目录结构
          rm: false

      - name: Restart PM2
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          port: 2222
          script: |
            cd /www/wwwroot/ticket-server2
            
            # 1. 确保目录存在
            mkdir -p standalone/.next
            
            # 2. 将上传的新 .next/server 文件覆盖到 standalone 中
            if [ -d ".next/server" ]; then
              cp -rf .next/server standalone/.next/
            fi
            
            # 3. 移动 static 文件夹（根据你的 ls 结果，它现在叫 static）
            if [ -d "static" ]; then
              rm -rf standalone/.next/static
              cp -r static standalone/.next/
              echo "Static moved successfully"
            fi
            
            # 4. 移动 public 文件夹
            if [ -d "public" ]; then
              rm -rf standalone/public
              cp -r public standalone/
              echo "Public moved successfully"
            fi

            # 4. 启动服务
            # 进到 standalone 目录启动，或者指定 ecosystem 的位置
            if [ -f "ecosystem.config.js" ]; then
              pm2 reload ecosystem.config.js --update-env || pm2 start ecosystem.config.js
            else
              # 如果还是找不到 ecosystem，就直接用 pm2 暴力启动 server.js
              cd standalone
              pm2 reload server.js --name "ticket-server2" || pm2 start server.js --name "ticket-server2" -- --port 3001
            fi
            
            echo "Waiting for Next.js server to boot..."
            sleep 3
            pm2 logs ticket-server2 --lines 20 --nostream

            echo "---- Verify: local Next ----"
            curl -fsS -D - http://127.0.0.1:3001/ticket2 -o /tmp/ticket2.html >/dev/null || true
            sed -n 's/.*<title>\(.*\)<\/title>.*/\1/p' /tmp/ticket2.html | head -n 1 || true

            echo "---- Verify: nginx ----"
            curl -kfsS -D - https://127.0.0.1/ticket2 -o /tmp/ticket2-nginx.html >/dev/null || true
            sed -n 's/.*<title>\(.*\)<\/title>.*/\1/p' /tmp/ticket2-nginx.html | head -n 1 || true
